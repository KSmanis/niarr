---
default_install_hook_types:
  - commit-msg
  - pre-commit
repos:
  # Meta
  - repo: meta
    hooks:
      - id: check-hooks-apply
        priority: &read-only 1000
      - id: check-useless-excludes
        priority: *read-only
  # Generic
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-shebang-scripts-are-executable
        priority: *read-only
      - id: end-of-file-fixer
        priority: &write-serial null
      - id: trailing-whitespace
        priority: *write-serial
  # Git
  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint
        priority: *read-only
      - id: gitlint-ci
  # GitHub Actions
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        priority: *read-only
  # JSON
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: pretty-format-json
        args: ["--autofix"]
        priority: &write-parallel 999
      - id: check-json
        priority: *read-only
  # Markdown
  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm
        args: ["--number", "--wrap", "80"]
        priority: *write-parallel
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        priority: *read-only
  # Python
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.2
    hooks:
      - id: uv-lock
        priority: *write-serial
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: ["--fix"]
        priority: *write-serial
      - id: ruff-format
        priority: *write-serial
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        language: system
        entry: mypy
        priority: *read-only
        require_serial: true
        types: ["python"]
  # TOML
  - repo: https://github.com/pappasam/toml-sort
    rev: v0.24.4
    hooks:
      - id: toml-sort-fix
        priority: *write-serial
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-toml
        priority: *read-only
  # YAML
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        priority: *read-only
